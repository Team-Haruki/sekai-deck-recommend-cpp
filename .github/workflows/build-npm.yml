name: Build npm package

on:
  workflow_call:
    inputs:
      source_ref:
        description: "Git ref to build"
        required: false
        type: string

jobs:
  npm:
    name: npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.source_ref || github.ref }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install emsdk
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          "$HOME/emsdk/emsdk" install 5.0.7
          "$HOME/emsdk/emsdk" activate 5.0.7

      - name: Build WebAssembly artifacts
        run: |
          source "$HOME/emsdk/emsdk_env.sh"
          emcmake cmake -S . -B build_wasm -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build_wasm -j

      - name: Pack npm package
        run: npm pack
        working-directory: npm/haruki-sekai-deck-recommend-cpp

      - name: Upload npm package
        uses: actions/upload-artifact@v7.0.1
        with:
          name: npm-package
          path: npm/haruki-sekai-deck-recommend-cpp/haruki-sekai-deck-recommend-cpp-*.tgz
