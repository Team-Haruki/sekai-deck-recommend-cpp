name: Build and publish packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package_version:
        description: "npm package version to publish"
        required: true
        default: "0.2.22"
        type: string
      source_ref:
        description: "Git ref to build for npm publish"
        required: true
        default: "v0.2.22"
        type: string

jobs:
  build_wheels:
    name: Build wheels
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/build-wheels.yml

  build_sdist:
    name: Build sdist
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/build-sdist.yml

  build_npm:
    name: Build npm package
    uses: ./.github/workflows/build-npm.yml
    with:
      source_ref: ${{ inputs.source_ref || github.ref }}

  github_release:
    name: Create GitHub Release
    if: github.event_name != 'workflow_dispatch'
    needs:
      - build_wheels
      - build_sdist
      - build_npm
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_pypi:
    name: Publish to PyPI
    if: github.event_name != 'workflow_dispatch'
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest

    environment:
      name: pypi-publish
      url: https://pypi.org/p/haruki-sekai-deck-recommend-cpp

    permissions:
      id-token: write

    steps:
      - name: Download PyPI artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: pypi-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/

  publish_npm:
    name: Publish to npm
    needs:
      - build_npm
    runs-on: ubuntu-latest

    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/haruki-sekai-deck-recommend-cpp

    permissions:
      id-token: write

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Download npm package
        uses: actions/download-artifact@v8.0.1
        with:
          name: npm-package
          path: dist

      - name: Publish to npm
        env:
          EXPECTED_NPM_VERSION: ${{ inputs.package_version }}
        run: |
          shopt -s globstar nullglob
          packages=(dist/**/haruki-sekai-deck-recommend-cpp-*.tgz)

          if [ "${#packages[@]}" -ne 1 ]; then
            echo "Expected exactly one npm package, found ${#packages[@]}."
            find dist -maxdepth 4 -type f -print
            exit 1
          fi

          if [ -n "${EXPECTED_NPM_VERSION:-}" ]; then
            actual_version="$(
              tar -xOf "${packages[0]}" package/package.json \
                | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version"
            )"

            if [ "${actual_version}" != "${EXPECTED_NPM_VERSION}" ]; then
              echo "Expected npm package version ${EXPECTED_NPM_VERSION}, got ${actual_version}."
              exit 1
            fi
          fi

          npm publish "$(realpath "${packages[0]}")" --provenance
