name: Build and publish packages

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels
    uses: ./.github/workflows/build-wheels.yml

  build_sdist:
    name: Build sdist
    uses: ./.github/workflows/build-sdist.yml

  build_npm:
    name: Build npm package
    uses: ./.github/workflows/build-npm.yml

  github_release:
    name: Create GitHub Release
    needs:
      - build_wheels
      - build_sdist
      - build_npm
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_pypi:
    name: Publish to PyPI
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest

    environment:
      name: pypi-publish
      url: https://pypi.org/p/haruki-sekai-deck-recommend-cpp

    permissions:
      id-token: write

    steps:
      - name: Download PyPI artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: pypi-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/

  publish_npm:
    name: Publish to npm
    needs:
      - build_npm
    runs-on: ubuntu-latest

    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/haruki-sekai-deck-recommend-cpp

    permissions:
      id-token: write

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm package
        uses: actions/download-artifact@v8.0.1
        with:
          name: npm-package
          path: dist

      - name: Publish to npm
        run: npm publish dist/haruki-sekai-deck-recommend-cpp-*.tgz --provenance
